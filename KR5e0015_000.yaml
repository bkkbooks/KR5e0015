body:
  text: 太上洞玄靈寳國王行道經元始天尊告太上道君曰吾念萬兆愚迷分靈布化遍滿十方无極世界天上人間一切國王說經演教隨代淺深導引衆生令歸善路永去煩惱登解脫地入正法門是故變身應其縁感因機散景順俗和光撫接人天善勸方便勞謙忍苦安樂衆生或見大身滿虚空界或見小身入細微塵或爲國主或作天王或應世師或居宰輔賢人道士博學儒宗牧伯大臣儲宫妃后忠良貞正翊贊君王設法教人勸化愚鄙普令離苦咸入信根轉向至真成无上道永登常樂安住湛然同彼虚空无生无滅十方衆聖從此歸根太上道君稽首問曰衆生劣弱識見未深雖覩經文不能信解如何開悟得斷衆疑天尊答曰衆生愚癡根性闇弱猶如孩子智慧未明當漸導引方便使悟豈得頓爾即入正真諭如慈母養所愛子漸漸教訓智慧增明轉處人間无事不解學業超勝成大丈夫勸誘凡愚亦復如是轉展增進令人昇玄太上問曰欲以經教付與國主人王其意云何天尊答曰吾所以周遍十方教化說法勸導天人分諸境域國界方所立君置主順俗隨時軌儀制度善巧方便秖欲安樂衆生開悟一切而國主人王者或請聖真仙應身下代教化人間諸天帝王託生凡境作人父母或星精降世或氣象垂靈或宿福報來或先因授得人中天上統御群司攝化衆生是其教首一切經法咸付國王敬道度人皆由之耳云何今日而有此疑太上道君啓曰昔從天尊遊歷十方教化國王說法度人經戒軌儀雖傳於世使國王行道而未見囑付人君所以今日敢此諮問伏蒙大慈廣爲弘演經教興廢莫不由之願從今後一切聖教悉付與之天尊告曰吾今普告十方天上天下无極世界諸天帝王及諸國王儲宫妃后宰輔大臣統御人首行王教者當各從吾此言吾過去後應以經教付囑於汝汝諸國王弘道救物開度天人天尊告曰國主人王先當立觀度人住持供養引諸男女令歸正道永捨苦因勑宰輔大臣儲宫妃后所在之處建諸法座百千萬數廣召道士明解經教常敷妙義講說大乘一洞幽微七部玄㫖使遠近開悟一切聞知願國土安寧人民快樂存亡獲果地獄休閑男女賢明普令離苦克成真道長慶自然天尊曰次當造諸形像真應化身過去未來見在三世十方三界得道天尊仙真聖品仙童玉女金剛神王左右香官龍虎君等隨其所有金銀珠玉繡畫織成刻木範泥鑿龕琢石雕牙鏤骨印紙圖晝一念發心大小隨力莊嚴朴素各盡當時如事我身至誠供養隨心獲福果報不差普使人天歸依禮拜幽明享祚功德難思天尊曰次當抄寫諸經三十六部金書玉字建碣立碑紙素精微隸篆巧拙各隨心力遠近流通標軸莊嚴函笥藏舉比字校定卷目齊同分布人天傳授男女常令轉讀願國安寧使諸道士講習妙義敷揚大化普遺聞知一切衆生悉令悟道識身浮幻聚散須臾不浮臭穢妄想煩惱晝夜相煎念念无常生老病死世間名利本悉是空内觀我身元无有處當依正道制伏迷心永斷愚癡長登解脫遠超生死常住湛然天尊曰常當造諸堂殿樓閣臺榭齋厨别院諸雜屋宇師房講室福地所須修創營建補緝舊居護持破瓌永令常住不使丘墟廣度人民勤心保護勸諸男女禮拜歸依願國安寧道教隆盛功德无量不可思議天尊曰常當造諸鍾磬幡花帳座供養法具牀席茵褥香鑪澡罐帕複函篋如意几拂幢蓋節輿香山寳樹一切器具金銀珠玉供養及諸經法出家道士願國安寧勸諸男女普發善心平等歸依永无二想供養功德不可思議天尊曰常當造諸法衣法服冠履劎杖乘床坐褥卧具帳帷食器匙筯巾刀櫛笥出家法具供養道士願國安寧常爲衆生紹隆正法施諸良藥救療人民普上法橋脫生死海共諸男女同登玉清天尊曰常當布施金銀珠玉綾羅錦繡衣服器具車輿駝馬田園屋宅僮僕玩弄香花燈燭飲食滋味米麥之屬入諸常住供養天尊及以經法山棲道士出家法身齋戒中食貧窮老病囚徒行役鳥獸蟲魚普施一切願國安寧百穀豐登人民歡樂天下開泰國土太平功德巍巍不可稱量天尊曰常當慈悲放生贖命開宥囚徒免人死罪救抜危苦醫療女男廣設福田惠諸齋會放其僕賤更使出家行大慈悲安樂一切及諸鳥獸草木蟲魚願國安寧普皆快樂功德至重不可思議天尊曰常當施諸香油於玄壇靈觀及聖真化迹有經像處供養虚空十方得道无量天尊過去未來三世仙真聖衆普皆注念願國安寧當願香花遍照三界十方道境五億諸天若聖若凡咸蒙明凈普聞芳徹俱覩光明男女有心同誠歸向永離黑暗長享自然天尊曰常當修造尊像經法玄壇聖迹使相好光明文字齊整殿堂妙麗基址寬平若洗拭真容裝潢卷軸常令清凈願國安寧百姓歡娛兆民慶悅男女端嚴相貌如華過去受生六根具足聦明智慧壽命无窮天下太平一切安樂十方三界稱讚善功享福長生共成真道天尊曰常當於諸靈觀然長明燈使晝夜不絶佐天光明願國安寧兵戈不起水火涓除妖怪潜亡疾病平復諸灾永殄衆禍不興筭命延長國土安樂諸天稱慶聖衆監臨生死蒙恩人天享祚天尊曰常當供養道士給其所須香油飲食法衣法具願國安寧仁義自興禮教自行男女昌樂欣國太平嘉祥日見善瑞同臻甘露醴泉充滿郊甸兆人歡慶百穀豐登天尊曰常當召諸道士建三洞衆齋行道禮懺燒香然燈悔謝存亡无量罪業願國安寧生死同慶男女歡欣四天帝王十部威神燒香散花浮空而來條牒罪福列功上清普天快樂國富人豐天尊曰常當以月朔中晦十直八節甲子庚申三元五臘本命三會吉辰建齋行道供養三寳施散貧寒開放囚徒免人死罪放贖生命出賤從良廣行慈救大設福田造諸功德願國安寧天人稱慶仙聖降臨風雨順調疾病不生男女昌熾國土興隆天尊曰常當朝晡禮拜十方三界得道諸天尊等无量衆聖懺謝存亡宿罪一切重愆乞除死録注名長生燒香散花勤心不怠願國安寧年命延續祚曆无窮子孫賢孝智慧聦明祭祀不絶天下太平天尊曰常當召諸道士轉讀三洞一切衆經及抄寫校定願國安寧刀兵止息水旱消除百穀熟成兆民歡樂男女欣慶疾病康和靈芝神草生於宫庭四時合度星宿光明妖灾殄滅禎瑞繁興天尊曰常當詣道士請受三洞經誡符籙佩帶在身檢持心口調正身神依科修奉旦夕勤行普爲一切願國安寧三界敬護五帝扶迎魔王束手萬邪虔恭諸天福祐注名仙宫飛行上清長享自然天尊曰常當勸諸男女就道士法師受戒懺悔止罪防非涓除罪累願國安寧善神保佑衆惡消亡疾病平復男女貞良君信臣忠上下和平三光合度四氣循常草木滋茂國富人豐天尊曰常當以正月四月七月十月一日於宫中庭闕部治城郭通衢迥路鄽市坊巷門亭衆所玄壇靈觀建大寳輪然萬巵神燈法諸天象凡十五日召道士法衆行道禮拜燒香散花立百座千座講說三洞衆經願國安寧使兵戈不起疾病不生灾怪潜伏厄難消除星辰合度日月光明水旱蟲霜衆灾不興男女昌樂存亡受恩天尊曰常當以天之八正日燒香行道建大齋供誦讀真經數演妙義講說大乘然燈散花懺謝重愆注名八天黄籙白簡削死上生供養道士願國安寧君臣一意上下忠良百穀滋茂兆民興隆男女欣樂天下太平天尊曰常當以正月十五日七月十五日十月十五日三元考校罪福之辰當先七日召諸道士敷百法座講說衆經行道禮拜散花燒香然萬巵燈作玄都大獻採諸花果名衣上服七寳珍竒綾羅錦綺玩弄調度器具飲食香藥雜物隨世所有米麥車輿幡花幢蓋卧具几杖瓶盂茵褥種種發心建玄都寳盤大小多少惟在厥誠羅列供養上獻天尊十方諸聖虚无道鏡一切真仙中獻天上天下應化威靈下及三塗五苦受苦幽魂一切男女諸衆生等遍皆享祚俱捨惡因願國安寧普天慶樂生死蒙恩天尊曰常當以八正甲子本命三元八會之日投告山水脆獻龍璧環鉏簡名列詞削罪三官録字上清啓告諸天願國安寧祚曆延長壽筭无窮天下昌樂欣國太平人民歡泰疫癘消除天尊曰若天地否革日月乖違五星失度七曜差移兆民疾疫水旱不調兵戈四起鬼哭山鳴妖怪潜興萬禍千凶當立百座千座講說三洞一切衆經行道禮謝散花燒香然萬巵燈上法天象念誦讚歎設齋布施廣行慈救大建福田放生贖命開宥囚徒免諸死罪拯濟危苦施惠貧窮度人造觀鑄像抄經於國八方及有灾分野五嶽名山造八方天尊仙真聖衆安置供養保鎮國土降福消灾使國土安寧星宿合度日月貞明百姓安樂疫癘涓亡一切凶寇應時殄滅穀稼豐登男女欣泰普天和平天尊曰吾常當以大慈平等憐念衆生開度一切令離諸苦使得安樂入衆妙門成无上道但衆生愚迷不從我教背正向邪動犯諸惡妄想顚倒煩惱纏身自落地獄謂吾不慈是故從劫到劫遍歷十方天上人間隨代變見真應化法撫接因時善巧機宜和光救物濟度一切廣設因縁演法說經普行開度及諸弟子數若塵沙充滿人天行吾經教救拔危苦彌歷世間萬法千方本期入道是諸男女當各至誠從法觀心從心取法明心了法悟道成真自麄入妙由近至遠轉轉增進智慧圓明昇入无形會乎空寂湛然不動方證至真未階此地須建大功從有相中次第修習勇猛精進勤苦至誠念念發心吾悉知覺凡諸舉意造衆福田天上世間仙真聖衆善惡童子金剛神王三界四司五帝官屬隨其起念記録抄條罪福因縁毫分不失計功補過罰罪賞功積惡滅身累善隆德猶彼影響以應形聲又如鑑照隨形好醜終不差也汝諸男女宜各愼之天尊曰凡人修善行惡皆諸天鑒照衆聖聞知而國主人王又復審之舉動施爲悉天應之吉則應善凶則應灾觀其兆象以誡其身清凈无爲天地和平擾蕩隂陽煩濁人鬼水旱灾癘草木榮枯唯國王感之故爲人主當順天化人教以道德愛民養物寡欲少私清凈无爲則身長久國祚安也太上道君及諸會衆燒香散花圍遶天尊一時禮拜同聲稱善天地振動山海波蕩草木飄揚一日一夜天人恐怖不知所由於是天尊放五色光遍照十方如正中日天上天下地上地下照耀明徹洞觀无礙一切男女有縁无縁咸覩天尊猶日中像清凈希有微妙第一不可思議當爾國中諸男女等身相明了衆惱涓除智慧增進咸得長生時諸聖衆稽首而退太上洞玄靈寳國王行道經
